<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — Finch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/app.css" />
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-base);
      padding: 1.5rem;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.625rem;
      margin-bottom: 2rem;
    }

    .login-logo-icon {
      width: 36px;
      height: 36px;
      background: var(--emerald-500, #10b981);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .login-logo-text {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .login-logo-text span {
      color: var(--emerald-400, #34d399);
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 2rem;
    }

    .login-heading {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 0.375rem;
    }

    .login-sub {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0 0 1.75rem;
    }

    .login-error {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.25);
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
      color: #fb7185;
    }

    .login-submit {
      width: 100%;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M9 12h6M12 9v6"/>
        </svg>
      </div>
      <span class="login-logo-text">Fin<span>ch</span></span>
    </div>

    <!-- Card -->
    <div class="login-card">
      <h1 class="login-heading">Welcome back</h1>
      <p class="login-sub">Enter your password to continue.</p>

      {% if error %}
      <div class="login-error" role="alert">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" autocomplete="on">
        <input type="hidden" name="next" value="{{ next }}">

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-input{% if error %} error{% endif %}"
            autocomplete="current-password"
            autofocus
            required
          >
        </div>

        <button type="submit" class="btn btn-primary login-submit">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </form>
    </div>

    <div class="login-footer">Personal finance · Finch</div>

  </div>

</body>
</html>
