name: Build & Push Docker Image

on:
  push:
    branches: ["main"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to ghcr.io

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── QEMU ───────────────────────────────────────────────────────────────
      # Emulates non-native architectures on the x86 runner so Buildx can
      # produce linux/arm64 images without dedicated ARM hardware.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Buildx ─────────────────────────────────────────────────────────────
      # Docker Buildx is required for multi-platform builds and inline caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Registry login ─────────────────────────────────────────────────────
      # Only needed on push events; PRs build but do not push.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image metadata / tags ──────────────────────────────────────────────
      # Generates the tags and OCI labels that are applied to the image.
      #
      # Tag strategy:
      #   push to main       → latest, sha-<short>
      #   push tag v1.0.0    → v1.0.0, latest, sha-<short>
      #   pull request       → pr-<number>  (built but not pushed)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=ref,event=pr

      # ── Build & push ───────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps layer re-use across workflow runs,
          # drastically cutting build times for dependency-heavy stages.
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: true   # adds SLSA provenance attestation
          sbom: true         # adds Software Bill of Materials attestation
